name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: npm run build
      env:
        NODE_ENV: production
    
    - name: Create 404.html for GitHub Pages
      run: |
        cat > out/404.html << 'EOF'
        <!DOCTYPE html>
        <html lang="es">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Redirección</title>
            <script>
                const pathname = window.location.pathname;
                if (!pathname.startsWith('/valrojo-formacion/')) {
                    window.location.href = '/valrojo-formacion' + pathname + window.location.search;
                }
            </script>
        </head>
        <body>
            <p>Redirigiendo...</p>
        </body>
        </html>
        EOF
    
    - name: Deploy to gh-pages
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git checkout --orphan gh-pages
        git rm -rf .
        
        cp -r out/* .
        
        mkdir -p valrojo-formacion
        cp -r out/* valrojo-formacion/
        
        git add .
        git commit -m "Deploy to GitHub Pages" || echo "Nothing to commit"
        git push -f origin gh-pages
